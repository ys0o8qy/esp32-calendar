version: 1.0.0
# Devices for DFRobot Romeo ESP32-S3 (DFR0994)
devices:

  # OV3660 over DVP 8-bit (Romeo CAM connector pin table)
  - name: camera
    type: camera
    sub_type: dvp
    version: default
    config:
      dvp_config:
        reset_io: -1
        pwdn_io: -1
        vsync_io: 6
        de_io: 42
        pclk_io: 5
        xclk_io: 45
        xclk_freq: 20000000
        data_width: CAM_CTLR_DATA_WIDTH_8
        data_io:
          data_io_0: 39
          data_io_1: 40
          data_io_2: 41
          data_io_3: 4
          data_io_4: 7
          data_io_5: 8
          data_io_6: 46
          data_io_7: 48
          data_io_8: -1
          data_io_9: -1
          data_io_10: -1
          data_io_11: -1
          data_io_12: -1
          data_io_13: -1
          data_io_14: -1
          data_io_15: -1
    peripherals:
      - name: i2c_master
        frequency: 100000

  # GDI 3.5" IPS 480x320, controller ST7365P
  - name: display_lcd
    chip: st7365
    type: display_lcd
    sub_type: spi
    version: default
    dependencies:
      atanisoft/esp_lcd_ili9488: "^1.1.0"
    config:
      mirror_x: false
      mirror_y: false
      swap_xy: true
      invert_color: false
      x_max: 480
      y_max: 320
      io_spi_config:
        cs_gpio_num: 18
        dc_gpio_num: 3
        spi_mode: 0
        pclk_hz: 40000000
      lcd_panel_config:
        reset_gpio_num: 38
        rgb_ele_order: LCD_RGB_ELEMENT_ORDER_BGR
        bits_per_pixel: 16
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        vendor_config: NULL
    peripherals:
      - name: spi_gdi

  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    peripherals:
      - name: ledc_backlight

  # microSD over SPI on GDI bus (SD_CS=0, SCLK=17, MOSI=15, MISO=16)
  - name: fs_sdcard
    type: fs_fat
    sub_type: spi
    version: default
    config:
      vfs_config:
        format_if_mount_failed: false
        max_files: 5
      sub_config:
        cs_gpio_num: 0
        frequency: SDMMC_FREQ_DEFAULT
    peripherals:
      - name: spi_gdi

  # 4-channel H-bridge PH/EN (PMODE shorted): EN=PWM via ledc_ctrl, PH=direction via gpio_ctrl
  - name: motor_m1
    type: ledc_ctrl
    version: default
    config:
      default_percent: 0
    peripherals:
      - name: ledc_motor_m1_en

  - name: motor_m1_dir
    type: gpio_ctrl
    version: default
    config:
      active_level: 1
      default_level: 1
    peripherals:
      - name: gpio_motor_m1_ph

  - name: motor_m2
    type: ledc_ctrl
    version: default
    config:
      default_percent: 0
    peripherals:
      - name: ledc_motor_m2_en

  - name: motor_m2_dir
    type: gpio_ctrl
    version: default
    config:
      active_level: 1
      default_level: 1
    peripherals:
      - name: gpio_motor_m2_ph

  - name: motor_m3
    type: ledc_ctrl
    version: default
    config:
      default_percent: 0
    peripherals:
      - name: ledc_motor_m3_en

  - name: motor_m3_dir
    type: gpio_ctrl
    version: default
    config:
      active_level: 1
      default_level: 1
    peripherals:
      - name: gpio_motor_m3_ph

  - name: motor_m4
    type: ledc_ctrl
    version: default
    config:
      default_percent: 0
    peripherals:
      - name: ledc_motor_m4_en

  - name: motor_m4_dir
    type: gpio_ctrl
    version: default
    config:
      active_level: 1
      default_level: 1
    peripherals:
      - name: gpio_motor_m4_ph
