version: 1.0.0
# Devices Configuration for NM-CYD-C5 (ESP32-C5)

devices:
  - name: display_lcd
    chip: st7789
    type: display_lcd
    sub_type: spi
    version: default
    config:
      mirror_x: false
      mirror_y: true
      swap_xy: true
      invert_color: false
      x_max: 320
      y_max: 240
      io_spi_config:
        cs_gpio_num: 23
        dc_gpio_num: 24
        spi_mode: 0
        pclk_hz: 40000000
      lcd_panel_config:
        reset_gpio_num: -1
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        vendor_config: NULL
    peripherals:
      - name: spi_display

  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    config:
      default_percent: 100
    peripherals:
      - name: ledc_backlight

  - name: led_strip
    chip: ws2812
    type: custom
    version: default
    init_skip: true
    dependencies:
      espressif/led_strip:
        version: "^3.0"
        public: true
    config:
      gpio_num: 27
      max_leds: 1

  - name: fs_sdcard
    type: fs_fat
    sub_type: spi
    version: default
    init_skip: true
    config:
      sub_config:
        cs_gpio_num: 10
        frequency: SDMMC_FREQ_DEFAULT
    peripherals:
      - name: spi_display

  - name: lcd_touch
    chip: xpt2046
    type: custom
    version: default
    init_skip: true
    config:
      cs_gpio_num: 1
      x_max: 320
      y_max: 240
    peripherals:
      - name: spi_display

  - name: gps_uart
    chip: nmea_gps
    type: custom
    version: default
    init_skip: true
    config:
      rx_gpio_num: 4
      tx_gpio_num: 5
      baud_rate: 9600

  - name: buttons
    chip: gpio_button
    type: custom
    version: default
    init_skip: true
    config:
      boot_gpio_num: 0
      active_level: 0