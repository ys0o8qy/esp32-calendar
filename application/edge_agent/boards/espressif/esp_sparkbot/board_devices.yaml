version: 1.0.0
# Devices Configuration for ESP32-S3 SparkBot

devices:
  - name: display_lcd
    chip: st7789
    type: display_lcd
    sub_type: spi
    version: default
    config:
      mirror_x: false
      mirror_y: false
      swap_xy: false
      invert_color: true
      x_max: 240
      y_max: 240
      io_spi_config:
        cs_gpio_num: 44
        dc_gpio_num: 43
        spi_mode: 0
        pclk_hz: 40000000
      lcd_panel_config:
        reset_gpio_num: -1
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        vendor_config: NULL
    peripherals:
      - name: spi_display

  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    peripherals:
      - name: ledc_backlight

  - name: audio_dac
    chip: none
    type: audio_codec
    version: default
    init_skip: true
    config:
      adc_enabled: false
      dac_enabled: true
    peripherals:
      - name: i2s_audio_out

  - name: audio_adc
    chip: internal
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      dac_enabled: false
      adc_max_channel: 1
      adc_channel_mask: "1"
      adc_init_gain: 0
    peripherals:
      - name: i2s_audio_in

  - name: imu_sensor
    chip: bmi270
    type: custom
    version: 1.0.0
    init_skip: true
    config:
      i2c_addr: 0x68
      frequency: 400000
      int_gpio_num: -1
      sdo_gpio_num: -1
    peripherals:
      - name: i2c_master

  - name: camera
    type: camera
    sub_type: dvp
    version: default
    config:
      dvp_config:
        reset_io: -1
        pwdn_io: -1
        vsync_io: 6
        de_io: 7
        pclk_io: 13
        xclk_io: 15
        xclk_freq: 20000000
        data_width: CAM_CTLR_DATA_WIDTH_8
        data_io:
          data_io_0: 11
          data_io_1: 9
          data_io_2: 8
          data_io_3: 10
          data_io_4: 12
          data_io_5: 18
          data_io_6: 17
          data_io_7: 16
          data_io_8: -1
          data_io_9: -1
          data_io_10: -1
          data_io_11: -1
          data_io_12: -1
          data_io_13: -1
          data_io_14: -1
          data_io_15: -1
    peripherals:
      - name: i2c_master
        frequency: 100000

  - name: status_led
    chip: gpio_led
    type: custom
    version: 1.0.0
    init_skip: true
    config:
      gpio_num: 3
      active_level: 1
    peripherals:
      - name: gpio_led
