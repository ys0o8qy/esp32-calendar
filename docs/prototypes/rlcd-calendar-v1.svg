<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 400 300" role="img" aria-label="ESP32-S3-RLCD-4.2 calendar prototype">
  <defs>
    <style>
      .bg { fill: #f7f6ef; }
      .ink { fill: #171717; }
      .muted { fill: #5a5a54; }
      .line { stroke: #171717; stroke-width: 1.4; fill: none; }
      .soft-line { stroke: #9a998f; stroke-width: 1; fill: none; }
      .panel { fill: #fffefa; stroke: #171717; stroke-width: 1.2; }
      .dark { fill: #171717; }
      .inverse { fill: #f7f6ef; }
      .warn { fill: #d8d3bf; stroke: #171717; stroke-width: 1; }
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "PingFang SC", sans-serif; letter-spacing: 0; }
      .small { font-size: 8px; }
      .meta { font-size: 10px; }
      .body { font-size: 12px; }
      .day { font-size: 14px; font-weight: 700; }
      .time { font-size: 48px; font-weight: 800; }
      .date { font-size: 20px; font-weight: 750; }
      .temp { font-size: 24px; font-weight: 800; }
      .section { font-size: 11px; font-weight: 800; }
    </style>
  </defs>

  <rect class="bg" width="400" height="300"/>
  <rect x="6" y="6" width="388" height="288" rx="6" class="line"/>

  <g id="status">
    <text x="18" y="24" class="meta muted">Wi-Fi 已连接  NTP 已同步</text>
    <text x="378" y="24" text-anchor="end" class="meta muted">天气 08:12  电量 82%</text>
  </g>

  <g id="hero-time">
    <text x="18" y="62" class="date ink">周二  6月23日</text>
    <text x="18" y="116" class="time ink">08:36</text>
    <text x="21" y="139" class="body muted">农历五月初九</text>
    <text x="21" y="153" class="meta muted">今日无雨，适合通勤</text>
  </g>

  <g id="weather" transform="translate(18 166)">
    <rect width="154" height="88" rx="4" class="panel"/>
    <text x="12" y="20" class="section ink">北京天气</text>
    <circle cx="30" cy="43" r="11" class="line"/>
    <path d="M50 48h40" class="line"/>
    <path d="M55 37h26" class="soft-line"/>
    <text x="102" y="48" class="temp ink">28°</text>
    <text x="12" y="70" class="meta muted">晴转多云  19-31°</text>
    <text x="12" y="82" class="small muted">湿度 46%  体感舒适</text>
  </g>

  <g id="agenda" transform="translate(18 256)">
    <rect x="0" y="0" width="154" height="24" rx="4" class="dark"/>
    <text x="10" y="16" class="meta inverse">下一项  10:30 项目同步</text>
  </g>

  <g id="month" transform="translate(190 45)">
    <rect width="190" height="201" rx="4" class="panel"/>
    <text x="12" y="23" class="section ink">2026 年 6 月</text>
    <text x="178" y="23" text-anchor="end" class="meta muted">第 26 周</text>
    <line x1="12" y1="33" x2="178" y2="33" class="soft-line"/>

    <g class="small muted" text-anchor="middle">
      <text x="21" y="49">一</text>
      <text x="45" y="49">二</text>
      <text x="69" y="49">三</text>
      <text x="93" y="49">四</text>
      <text x="117" y="49">五</text>
      <text x="141" y="49">六</text>
      <text x="165" y="49">日</text>
    </g>

    <g class="body ink" text-anchor="middle">
      <text x="21" y="72">1</text><text x="45" y="72">2</text><text x="69" y="72">3</text><text x="93" y="72">4</text><text x="117" y="72">5</text><text x="141" y="72">6</text><text x="165" y="72">7</text>
      <text x="21" y="96">8</text><text x="45" y="96">9</text><text x="69" y="96">10</text><text x="93" y="96">11</text><text x="117" y="96">12</text><text x="141" y="96">13</text><text x="165" y="96">14</text>
      <text x="21" y="120">15</text><text x="45" y="120">16</text><text x="69" y="120">17</text><text x="93" y="120">18</text><text x="117" y="120">19</text><text x="141" y="120">20</text><text x="165" y="120">21</text>
      <text x="21" y="144">22</text>
      <rect x="33" y="129" width="24" height="20" rx="3" class="dark"/>
      <text x="45" y="144" class="inverse">23</text>
      <text x="69" y="144">24</text><text x="93" y="144">25</text><text x="117" y="144">26</text><text x="141" y="144">27</text><text x="165" y="144">28</text>
      <text x="21" y="168">29</text><text x="45" y="168">30</text>
      <text x="69" y="168" class="muted">1</text><text x="93" y="168" class="muted">2</text><text x="117" y="168" class="muted">3</text><text x="141" y="168" class="muted">4</text><text x="165" y="168" class="muted">5</text>
    </g>

    <g>
      <circle cx="117" cy="151" r="2" class="ink"/>
      <circle cx="45" cy="175" r="2" class="ink"/>
    </g>
  </g>

  <g id="bottom-strip" transform="translate(190 256)">
    <rect width="190" height="24" rx="4" class="warn"/>
    <text x="10" y="16" class="meta ink">离线策略：RTC 保时，天气保留最近缓存</text>
  </g>
</svg>
