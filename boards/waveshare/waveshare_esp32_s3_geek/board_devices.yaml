version: 1.0.0
# Devices Configuration for Waveshare ESP32-S3-GEEK
devices:

  # On-board 1.14" ST7789 LCD (135x240, with 52/40 panel offset)
  - name: display_lcd
    chip: st7789
    type: display_lcd
    sub_type: spi
    version: default
    config:
      mirror_x: true
      mirror_y: true
      swap_xy: false
      invert_color: true
      x_max: 135
      y_max: 240
      io_spi_config:
        cs_gpio_num: 10          # LCD_CS
        dc_gpio_num: 8           # LCD_DC
        spi_mode: 0
        pclk_hz: 40000000
      lcd_panel_config:
        reset_gpio_num: 9        # LCD_RST
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        vendor_config: NULL
    peripherals:
      - name: spi_display

  # On-board TF card slot wired in SPI mode.
  # In SPI mode the card signals map as:
  #   D3(GPIO34)=CS, CMD(GPIO35)=MOSI, D0(GPIO37)=MISO, CLK(GPIO36)=SCK
  - name: fs_sdcard
    type: fs_fat
    sub_type: spi
    version: default
    config:
      mount_point: "/sdcard"
      vfs_config:
        format_if_mount_failed: false
        max_files: 5
        allocation_unit_size: 16384
      sub_config:
        cs_gpio_num: 34          # SD_CS (SDIO_D3)
    peripherals:
      - name: spi_sdcard
