version: 1.0.0
# Peripherals Configuration for ESP32-P4-Function-EV-Board
peripherals:
  # I2C Configuration
  # - name: i2c_master
  #   type: i2c
  #   role: master
  #   config:
  #     port: 0
  #     pins:
  #       sda: 7
  #       scl: 8

  # LDO Configuration for MIPI Power Supply, need to be initialized before MIPI.
  - name: ldo_mipi
    type: ldo
    config:
      chan_id: 3        # On the P4 function board, VO3_LDO is used to power mipi.
      voltage_mv: 2500  # For MIPI, the operating voltage needs to be set to 2.5V.
      adjustable: 1
      owned_by_hw: 0

  # DSI Configuration
  - name: dsi_display
    type: dsi
    config:
      bus_id: 0
      data_lanes: 2
      phy_clk_src: MIPI_DSI_PHY_CLK_SRC_DEFAULT
      lane_bit_rate_mbps: 1000

  # Backlight Control
  - name: ledc_backlight
    type: ledc
    version: default
    config:
      gpio_num: 52
      speed_mode: LEDC_LOW_SPEED_MODE
      channel: 1
      timer_sel: 1
      duty: 0
