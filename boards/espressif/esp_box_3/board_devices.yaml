# Devices Configuration
devices:
  # SD Card Power
  - name: sdcard_power
    type: power_ctrl
    sub_type: gpio
    peripherals:
    - name: gpio_sd_power
      active_level: 0

  - name: audio_dac
    chip: es8311
    type: audio_codec
    version: default
    config:
      adc_enabled: false
      dac_enabled: true
      dac_max_channel: 1
      # DAC channel mask, 1-enable, 0-disable, layout: left,right
      dac_channel_mask: "1"     # Left enable
      dac_init_gain: 0           # dB

      # Audio processing settings
      mclk_enabled: true

    # Power amplifier configuration
    peripherals:
      - name: gpio_pa_control
        gain: 6                    # dB
        active_level: 1            # 0-low, 1-high
      - name: i2s_audio_out
      - name: i2c_master
        address: 0x30
        frequency: 400000          # Hz

  - name: audio_adc
    chip: es7210
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      adc_max_channel: 4
      # The channel mask, 1-enable, 0-disable
      # e.g."0111", bit0: Mic0 enable, bit1: Mic1 enable, bit2: Mic2 enable, bit3: Mic3 enable, bit4: Mic4 disable
      adc_channel_mask: "0111"
      adc_channel_labels: ['NA', 'RE', 'FR', 'FL'] # MSB ~ LSB
      adc_init_gain: 0           # dB

    # Power amplifier configuration
    peripherals:
      # I2S interface configuration
      - name: i2s_audio_in
      # I2C interface configuration
      - name: i2c_master
        address: 0x80
        frequency: 400000          # Hz

  - name: fs_sdcard
    type: fs_fat
    sub_type: sdmmc
    power_ctrl_device: sdcard_power
    version: default
    config:
      sub_config:
        bus_width: 4
        pins:
          clk: 11
          cmd: 14
          d0: 9
          d1: 13
          d2: 42
          d3: 12

  - name: display_lcd
    chip: ili9341
    type: display_lcd
    sub_type: spi
    version: default
    dependencies:
      espressif/esp_lcd_ili9341: "*"
    config:
      mirror_x: true
      mirror_y: true
      x_max: 320
      y_max: 240
      # esp_lcd_panel_io_spi_config_t fields
      io_spi_config:
        cs_gpio_num: 5
        dc_gpio_num: 4
        spi_mode: 0
        pclk_hz: 20000000
        flags:
          sio_mode: true                 # Single line mode

      lcd_panel_config:
        reset_gpio_num: 48
        data_endian: "LCD_RGB_DATA_ENDIAN_LITTLE" # LCD_RGB_DATA_ENDIAN_LITTLE
        flags:
          reset_active_high: true
        # ST77916 specific configuration
        vendor_config: NULL

    peripherals:
    - name: spi_display            # SPI peripheral for LCD communication

  # Touch Panel Configuration
  - name: lcd_touch
    chip: gt911
    type: lcd_touch
    sub_type: i2c
    version: default
    dependencies:
      esp_lcd_touch:
        version: "*"
        require: public
      espressif/esp_lcd_touch_gt911: "*"
    config:
      io_i2c_config:
        lcd_cmd_bits: 16
      touch_config:
        x_max: 320
        y_max: 240
        int_gpio_num: 3
    peripherals:
      - name: i2c_master
        i2c_addr: [0xba, 0x28]

  - name: imu_sensor
    chip: icm42670
    type: custom
    version: 1.0.0
    init_skip: true
    config:
      i2c_addr: 0x68
      frequency: 400000
      int_gpio_num: -1                    # No interrupt pin on esp_box_3
    peripherals:
      - name: i2c_master

  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    peripherals:
      - name: ledc_backlight               # LEDC peripheral for GPIO 47

  # IR transceiver (NEC remote control)
  # Used by lua_module_ir; field order must match lua_ir_board_cfg_t.
  - name: ir_blaster
    chip: rmt_ir
    type: custom
    version: 1.0.0
    init_skip: true
    config:
      tx_gpio_num: 39                      # BSP_IR_TX_GPIO on ESP32-S3-BOX-3
      rx_gpio_num: 38                      # BSP_IR_RX_GPIO on ESP32-S3-BOX-3
      ctrl_gpio_num: 44                    # BSP_IR_CTRL_GPIO, enable pin for IR TX
      ctrl_active_level: 0                 # 0-low active enables the IR transmitter
      carrier_hz: 38000                    # 38 kHz carrier frequency
